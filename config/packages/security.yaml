security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
            logout:
                path: app_logout
            # ✅ Déconnexion après 10 min d'inactivité
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 600
                always_remember_me: false

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/devis, roles: ROLE_USER }
        - { path: ^/facture, roles: ROLE_USER }
        - { path: ^/bon-de-commande, roles: ROLE_USER }
        - { path: ^/clients, roles: ROLE_USER }
        - { path: ^/notes, roles: ROLE_USER }
        - { path: ^/depense, roles: ROLE_USER }
        - { path: ^/entreprise, roles: ROLE_USER }
        - { path: ^/stripe/webhook, roles: PUBLIC_ACCESS}

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10